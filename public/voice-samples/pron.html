<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>讀音測試 · 五 (um/ng)</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { margin:0; padding:24px 16px 48px; font-family:-apple-system,"PingFang HK","Segoe UI",system-ui,sans-serif; background:linear-gradient(160deg,#eef2ff,#fdf2f8); color:#1e293b; min-height:100vh; }
  .wrap { max-width:640px; margin:0 auto; }
  h1 { font-size:22px; margin:0 0 4px; }
  .sub { color:#64748b; font-size:14px; margin:0 0 18px; }
  .grp { background:rgba(255,255,255,.82); border:1px solid rgba(255,255,255,.9); border-radius:16px; padding:16px; margin-bottom:18px; box-shadow:0 4px 16px rgba(0,0,0,.05); }
  .want { color:#64748b; font-size:13px; margin:0 0 12px; }
  .opt { margin-bottom:12px; } .opt:last-child { margin-bottom:0; }
  .ol { font-weight:600; font-size:14px; margin-bottom:5px; }
  audio { width:100%; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🔤 五 —— 試 um / 鼻音</h1>
    <p class="want">句子:一、二、三、四、五。我買咗五個橙。想要嗰個「um5 / ng5」鼻音。</p>
    <div class="grp">
      <div class="opt"><div class="ol">A — 五 (原本)</div><audio controls preload="none" src="./five-orig.mp3"></audio></div>
      <div class="opt"><div class="ol">B — 嗯 (鼻音 um)</div><audio controls preload="none" src="./five-um-1.mp3"></audio></div>
      <div class="opt"><div class="ol">C — 㕵 (鼻音 m)</div><audio controls preload="none" src="./five-um-2.mp3"></audio></div>
      <div class="opt"><div class="ol">D — 唔 (m4)</div><audio controls preload="none" src="./five-m.mp3"></audio></div>
    </div>
    <p class="sub" style="text-align:center">有邊個啱就話我(例如「五用 B」)。<br><b>如果全部都唔啱 —— 咁就係 Chirp3-HD 嘅硬性極限,唯一真正解法係轉 Azure 廣東話聲。</b></p>
  </div>
<script>
  document.addEventListener("play", e => { document.querySelectorAll("audio").forEach(a=>{ if(a!==e.target) a.pause(); }); }, true);
</script>
</body>
</html>
