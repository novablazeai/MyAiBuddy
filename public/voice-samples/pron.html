<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>讀音測試 · 五</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { margin:0; padding:24px 16px 48px; font-family:-apple-system,"PingFang HK","Segoe UI",system-ui,sans-serif; background:linear-gradient(160deg,#eef2ff,#fdf2f8); color:#1e293b; min-height:100vh; }
  .wrap { max-width:640px; margin:0 auto; }
  h1 { font-size:22px; margin:0 0 4px; }
  .sub { color:#64748b; font-size:14px; margin:0 0 20px; }
  .grp { background:rgba(255,255,255,.82); border:1px solid rgba(255,255,255,.9); border-radius:16px; padding:16px; margin-bottom:18px; box-shadow:0 4px 16px rgba(0,0,0,.05); }
  .gh { font-weight:700; font-size:16px; margin:0 0 4px; }
  .want { color:#64748b; font-size:13px; margin:0 0 12px; }
  .opt { margin-bottom:12px; } .opt:last-child { margin-bottom:0; }
  .ol { font-weight:600; font-size:14px; margin-bottom:5px; }
  audio { width:100%; }
  .done { background:rgba(16,185,129,.12); border:1px solid rgba(16,185,129,.4); }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🔤 讀音測試:五 (ng5)</h1>

    <div class="grp done">
      <p class="gh">✅ 唔 —— 已定:用「吾」(ng4,你揀咗 C),已寫入把聲</p>
    </div>

    <div class="grp">
      <p class="gh">「五」—— 試 ng5 同音字</p>
      <p class="want">句子:一、二、三、四、五。我買咗五個橙。應該讀 ng5(低升音)。</p>
      <div class="opt"><div class="ol">A — 五 (原本)</div><audio controls preload="none" src="./five-A-orig.mp3"></audio></div>
      <div class="opt"><div class="ol">B — 伍 (ng5)</div><audio controls preload="none" src="./five-B-ng5-wu.mp3"></audio></div>
      <div class="opt"><div class="ol">C — 午 (ng5,「晏晝」個午)</div><audio controls preload="none" src="./five-C-ng5-ng.mp3"></audio></div>
    </div>

    <p class="sub" style="text-align:center">揀邊個最啱 ng5 音,話我(例如「五用 B」),我就寫入把聲。<br>全部都唔啱嘅話,就係要轉 Azure 先真正搞得掂。</p>
  </div>
<script>
  document.addEventListener("play", e => { document.querySelectorAll("audio").forEach(a=>{ if(a!==e.target) a.pause(); }); }, true);
</script>
</body>
</html>
